name: Build and Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.guard.outputs.skip }}
      pages_enabled: ${{ steps.pages_check.outputs.pages_enabled }}
    steps:
      - uses: actions/checkout@v5

      - name: Skip if template has not been initialised
        id: guard
        run: |
          # {{ZENODO_DOI}} is documented to remain unsubstituted until the first
          # GitHub release mints the concept DOI — so don't treat it as a blocker.
          # See docs/fair4rs-checklist.md.
          # Exclude the whole .claude/ tree: skill/agent docs legitimately contain
          # {{...}} example tokens (e.g. {{PRIOR_CHAIN_URI}} in the replication-study
          # skill), which are not uninitialised template fields. Matches the
          # first-run guard in CLAUDE.md, which also excludes ./.claude/.
          placeholder_files=$(grep -rln '{{[A-Z_]\+}}' . --include='*.md' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.cff' --include='*.py' --include='*.toml' 2>/dev/null \
            | grep -v '/\.claude/' \
            | while read f; do
                if grep -oE '\{\{[A-Z_]+\}\}' "$f" | grep -qv '{{ZENODO_DOI}}'; then
                  echo "$f"
                fi
              done)
          if [ -n "$placeholder_files" ]; then
            echo "::notice::Template placeholders detected ({{...}} tokens). Run /init-template inside Claude Code (or substitute manually) before the Jupyter Book builds meaningfully. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether GitHub Pages is enabled
        id: pages_check
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "::notice::GitHub Pages is enabled — Jupyter Book will deploy."
            echo "pages_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GitHub Pages is not yet enabled on this repo. Build will run; deploy will be skipped. Enable Pages at https://github.com/${{ github.repository }}/settings/pages (Source: GitHub Actions) to enable deploy on the next push."
            echo "pages_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pixi
        if: steps.guard.outputs.skip != 'true'
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.68.1
          locked: true
          cache: true
          environments: docs

      # The executed notebooks/*.ipynb (with cell outputs) are committed to the
      # repo, so the book is built FROM those outputs — we do NOT convert .py or
      # re-execute here. Re-execution would require Copernicus Marine credentials
      # (GLORYS download) plus the multi-hour pangeo-fish HMM, neither of which is
      # feasible on every push. To refresh the book, re-execute the notebooks
      # locally (data + creds + the results/rec_*.json HMM cache make this fast)
      # and commit the updated .ipynb. See docs/cicd-conventions.md.
      - name: Verify committed notebooks carry outputs
        if: steps.guard.outputs.skip != 'true'
        run: |
          missing=""
          for nb in notebooks/*.ipynb; do
            if ! pixi run -e docs python -c "import json,sys; nb=json.load(open(sys.argv[1])); sys.exit(0 if any(c.get('cell_type')=='code' and c.get('outputs') for c in nb['cells']) else 1)" "$nb"; then
              missing="$missing $nb"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::These committed notebooks have no cell outputs — the book would render empty. Re-execute locally and commit:$missing"
            exit 1
          fi

      - name: Build MyST site
        if: steps.guard.outputs.skip != 'true'
        env:
          # MyST silently ignores `base_url` in myst.yml — only this env var
          # works. See docs/cicd-conventions.md.
          BASE_URL: /${{ github.event.repository.name }}
        run: pixi run -e docs myst build --html

      - name: Upload pages artifact
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _build/html

  deploy:
    needs: build
    if: needs.build.outputs.skip != 'true' && needs.build.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
