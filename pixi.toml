# Single source of truth for the runtime — used by local dev, Docker, and CI.
# Add every dependency a notebook imports here. Local "kitchen-sink" envs
# (e.g. pangeo) hide missing deps; CI builds strictly from this file and will
# silently produce empty notebook cells if anything is missing.
#
# pixi.lock (committed alongside this file) pins every package to an exact
# build hash per platform. Regenerate it with `pixi install` after editing
# this file; commit both files in the same commit.

[workspace]
name = "white-shark-geolocation-replication"
# bioconda hosts snakemake (and downstream rule-engine ecosystem); conda-forge
# is the priority channel for everything else.
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
# --- core scientific stack ---
numpy = "*"
pandas = ">=2.0"
xarray = ">=2024.6"
scipy = "*"
matplotlib = "*"
pyarrow = "*"
# --- data download (DataONE REST API for DOI 10.24431/rw1k6c3) ---
requests = "*"
# --- notebook execution + Jupyter Book ---
jupytext = "*"
jupyterlab = "*"
nbclient = "*"
ipykernel = "*"
# --- pipeline driver ---
snakemake = "*"
# --- geolocation replication (pangeo-fish HMM, see DOMAIN.md) ---
dask = "*"                 # out-of-core / parallel (pangeo-fish state-space arrays)
numba = "*"                # pangeo-fish HMM kernels are numba-jitted
pint = "*"                 # units for the sigma-bound / speed prior in 03_analysis
toolz = "*"                # tlz.functoolz.curry for the HMM predictor factory
netcdf4 = "*"              # NetCDF I/O — preferred over .npz for arrays (see DOMAIN.md)
zarr = "*"                 # Zarr — preferred for arrays >2 GB or cloud-archived (see DOMAIN.md)
copernicusmarine = "*"     # Copernicus Marine Service — GLORYS12V1 thetao reference field
cartopy = "*"              # geographic plotting (track maps)
pyproj = "*"               # CRS + great-circle distances
xhistogram = "*"           # pangeo-fish emission-likelihood histogramming
flox = "*"                 # grouped reductions used by pangeo-fish
# healpy is pulled in transitively by pangeo-fish; install from conda-forge so
# its C++ extension is prebuilt (the PyPI sdist fails to compile on macOS).
healpy = "*"
# pangeo_fish.helpers imports these viz deps at module import time.
holoviews = "*"
hvplot = "*"
cmocean = "*"
geoviews = "*"

[pypi-dependencies]
# pangeo-fish (the open geolocation HMM) is PyPI-only; not on conda-forge.
pangeo-fish = "*"
# healpix-geo (EOPF-DGGS, geo-aware HEALPix; NESTED ordering — see DOMAIN.md).
healpix-geo = "*"
# xdggs gives pangeo-fish its HEALPix grid backend.
xdggs = "*"

[feature.docs.dependencies]
mystmd = "*"

[feature.tests.dependencies]
pytest = "*"

[environments]
default = { solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
tests = { features = ["tests"], solve-group = "default" }

[tasks]
run = "snakemake --cores 1"
book = "myst build --html"
lab = "jupyter lab"
